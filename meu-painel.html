<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Painel</title>
    <meta name="robots" content="noindex">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/png" href="favicon.png">

    <style>
        .container { margin-top: 10px !important; max-width: 1200px; }
        .header { margin-bottom: 15px !important; }
        .top-bar-custom { height: 4px; background: #D32F2F; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            align-items: stretch; /* Garante que as colunas tenham a mesma altura */
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .link-subtitle { display: none !important; }
        .link-title { font-size: 15px !important; }

        /* Caixa de Tarefas Fixa com Scroll Interno */
        .tasks-card {
            display: flex;
            flex-direction: column;
            height: 100%; /* Ocupa a altura total da coluna definida pelo card de links */
        }
        
        .todo-list-wrapper {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 8px;
            max-height: 400px; /* Limite visual para manter o alinhamento */
        }

        .todo-list-wrapper::-webkit-scrollbar { width: 5px; }
        .todo-list-wrapper::-webkit-scrollbar-thumb { background: #ddd; border-radius: 10px; }

        .todo-input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .todo-input-group input { 
            flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Inter', sans-serif;
        }
        
        .todo-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 10px 5px; border-bottom: 1px solid #eee; cursor: pointer;
        }
        .todo-text { font-size: 14px; color: #333; flex: 1; }
        .todo-text.completed { text-decoration: line-through; color: #999; }
        .btn-del { background: none; border: none; color: #D32F2F; cursor: pointer; opacity: 0.5; }

        @media (max-width: 1000px) {
            .main-grid { grid-template-columns: 1fr; }
            .tasks-card { height: auto; }
        }
    </style>
</head>
<body>
    <div class="top-bar-custom"></div>
    
    <div class="container">
        <header class="header">
            <div class="header-text">
                <h1>Meu Painel</h1>
                <p>Atalhos Rápidos</p>
            </div>
            <div class="header-logo">
                <img src="./logo-tamandare.png" alt="Logo" onerror="this.style.display='none'">
            </div>
        </header>

        <div class="main-grid">
            <section>
                <div class="card static-card" style="height: 100%;">
                    <div class="card-content">
                        <h2><i class="fa-solid fa-star"></i> Meus Atalhos</h2>
                        <ul class="link-list link-grid">
                            <li><a href="https://awstou.ifractal.com.br/tamandaretintas/login.php" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-clock"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Ponto Eletrônico</span></div>
                            </a></li>
                            <li><a href="https://tamandarett.github.io/auditoria-caixa/" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-calculator"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Auditoria Caixa</span></div>
                            </a></li>
                            <li><a href="https://www.cielo.com.br/" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-credit-card"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Cielo</span></div>
                            </a></li>
                            <li><a href="https://tamandarett.github.io/administrador-lacres-maqui/conferencia.html" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-stamp"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Conferência de Lacres</span></div>
                            </a></li>
                            <li><a href="https://github.com/" target="_blank">
                                <div class="link-icon"><i class="fa-brands fa-github"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">GitHub</span></div>
                            </a></li>
                            <li><a href="https://employers.indeed.com/jobs" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-briefcase"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Indeed</span></div>
                            </a></li>
                            <li><a href="https://tamandarett.github.io/painel-tamandare/" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-house"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Painel Rápido</span></div>
                            </a></li>
                            <li><a href="https://protestosp.com.br/Home/Acesso" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-file-invoice"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Protesto SP</span></div>
                            </a></li>
                            <li><a href="https://plataforma.ticketlog.com.br/" target="_blank">
                                <div class="link-icon"><i class="fa-solid fa-gas-pump"></i></div>
                                <div class="link-text-wrapper"><span class="link-title">Ticket Log</span></div>
                            </a></li>
                        </ul>
                    </div>
                </div>
            </section>

            <aside>
                <div class="card static-card tasks-card">
                    <div class="card-content">
                        <h2><i class="fa-solid fa-list-check"></i> Tarefas</h2>
                        <div class="todo-input-group">
                            <input type="text" id="todo-input" placeholder="Novo item..." autocomplete="off">
                            <button onclick="addTask()" class="btn-primary">Add</button>
                        </div>
                        <div class="todo-list-wrapper">
                            <ul id="todo-list" class="todo-list"></ul>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const input = document.getElementById('todo-input');
        const listElement = document.getElementById('todo-list');

        document.addEventListener('DOMContentLoaded', renderTasks);
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });

        function getTasks() { return JSON.parse(localStorage.getItem('minhas_tarefas') || '[]'); }

        function addTask() {
            const text = input.value.trim();
            if (!text) return;
            const tasks = getTasks();
            tasks.push({ text, completed: false });
            localStorage.setItem('minhas_tarefas', JSON.stringify(tasks));
            input.value = '';
            renderTasks();
        }

        function toggleTask(index) {
            const tasks = getTasks();
            tasks[index].completed = !tasks[index].completed;
            localStorage.setItem('minhas_tarefas', JSON.stringify(tasks));
            renderTasks();
        }

        function deleteTask(event, index) {
            event.stopPropagation();
            const tasks = getTasks();
            tasks.splice(index, 1);
            localStorage.setItem('minhas_tarefas', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const tasks = getTasks();
            listElement.innerHTML = tasks.map((task, i) => `
                <li class="todo-item" onclick="toggleTask(${i})">
                    <span class="todo-text ${task.completed ? 'completed' : ''}">${task.text}</span>
                    <button class="btn-del" onclick="deleteTask(event, ${i})">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </li>
            `).join('');
        }
    </script>
</body>
</html>
